name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BINARY_NAME: zap
  BUILD_TARGET: .

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail

          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for platform in "${platforms[@]}"; do
            read -r os arch <<< "$platform"
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi

            out="${BINARY_NAME}-${os}-${arch}${ext}"
            echo "Building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" "${BUILD_TARGET}"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum "${BINARY_NAME}"-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY_NAME }}-*
            checksums.txt
          generate_release_notes: true
